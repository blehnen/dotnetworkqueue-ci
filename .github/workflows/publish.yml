name: Build and publish

on:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    # Mondays 06:00 UTC. Catches Microsoft .NET 8/10 SDK updates and
    # Debian/CVE patches in the base image. The weekly-YYYYMMDD tag
    # gives operators a stable pin if they ever need to roll back.
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: blehnen74/dotnetworkqueue-ci
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=weekly,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=schedule,pattern=weekly-{{date 'YYYYMMDD'}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          # amd64 only — the consuming Jenkins host (Unraid AMD EPYC) is
          # x86_64. Add linux/arm64 to platforms if a future build node
          # ever needs it; the .NET 8 sidecar install via dotnet-install.sh
          # is already arch-aware, so the only follow-up is enabling QEMU.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
